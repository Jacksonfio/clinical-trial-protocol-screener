name: clinical-trial-protocol-screener
version: 0.2.0
description: >
  A high-fidelity OpenEnv environment simulating clinical trial patient screening.
  Features 4 task tiers (Easy → Expert), 20 edge-case patient profiles,
  drug-drug interaction detection, implicit lab-based medical reasoning,
  and asymmetric safety-aware reward shaping.
entrypoint: server.app:main
framework: openenv
license: MIT
metadata:
  authors:
    - name: Jackson JP
  tags:
    - medical-ai
    - clinical-trials
    - screening-automation
    - reasoning-benchmark
    - drug-interactions
    - implicit-reasoning
    - openenv
  tasks:
    - id: easy
      name: Hypertension Cardiovascular Study
      description: Basic boolean inclusion/exclusion checks with 1 required lab
    - id: medium
      name: Heart Failure Carvedilol Extension Trial
      description: Multi-variable lab bounds + drug-drug interaction detection
    - id: hard
      name: PD-L1 Inhibitor Immunotherapy Phase II
      description: 5-lab compound checks, multi-organ safety, complex medication exclusions
    - id: expert
      name: AAV9 Gene Therapy for Spinal Muscular Atrophy
      description: Implicit reasoning - agent must infer exclusions from raw lab values without condition names
